name: Build APK (debug)

# Produit un APK debug (auto-signé, installable) téléchargeable en artefact.
# Se déclenche sur push touchant android/ ou ce workflow, + manuellement.
on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK with commit sha
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             luciole-${GITHUB_SHA::7}-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: luciole-debug-apk
          path: luciole-*-debug.apk
          if-no-files-found: error
          retention-days: 30
