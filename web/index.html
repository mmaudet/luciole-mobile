<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>Luciole — l'IA qui agit</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 34rem; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.3rem; } textarea { width: 100%; height: 4rem; font-size: 1rem; }
    button { font-size: 1rem; padding: .6rem 1rem; margin-top: .5rem; }
    #out { margin-top: 1.2rem; } pre { background: #f4f4f4; padding: .6rem; overflow-x: auto; }
    a.action { display: inline-block; margin-top: .6rem; padding: .7rem 1rem; background: #1558d6; color: #fff; text-decoration: none; border-radius: .4rem; }
    .muted { color: #666; font-size: .85rem; }
    #examples { margin: .3rem 0 .2rem; }
    .chip { display: inline-block; margin: .2rem .3rem .2rem 0; padding: .4rem .7rem; font-size: .9rem; background: #eef1f7; border: 1px solid #cdd6e6; border-radius: 1rem; cursor: pointer; }
    .chip:hover { background: #e0e6f3; }
    .progress { height: .5rem; background: #e6eaf2; border-radius: .3rem; overflow: hidden; margin: .2rem 0 .4rem; }
    .progress span { display: block; height: 100%; width: 40%; background: #1558d6; border-radius: .3rem; animation: luciole-slide 1.1s infinite ease-in-out; }
    @keyframes luciole-slide { 0% { margin-left: -45%; } 100% { margin-left: 100%; } }
  </style>
</head>
<body>
  <h1>🔦 Luciole — dites, l'IA agit</h1>
  <p class="muted">100 % sur le téléphone là-bas. Aucun cloud. Tapez une phrase :</p>
  <textarea id="phrase" placeholder="ex : rappelle-moi d'appeler le dentiste demain à 14h"></textarea>
  <button id="go">Transformer en action</button>
  <p class="muted" style="margin: .6rem 0 .2rem">Pas d'idée ? Touchez un exemple :</p>
  <div id="examples"></div>
  <div id="out"></div>
  <script type="module" src="./app.js?v=4"></script>
</body>
</html>
